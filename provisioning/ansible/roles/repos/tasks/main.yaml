---
- name: Find repository files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d/
    file_type: file
    use_regex: true
    patterns: "{{ __repos_name_patterns }}"
  register: __repos_to_delete

- name: Remove found repository files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ __repos_to_delete.files }}"
  notify: Refresh package cache
