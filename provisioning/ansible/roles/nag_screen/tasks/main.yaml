---
- name: Create {{ __nag_screen_script_path }} directory
  ansible.builtin.file:
    path: "{{ __nag_screen_script_path }}"
    state: directory
    mode: '755'
    owner: root
    group: root

- name: Copy pve-nag-remover
  ansible.builtin.copy:
    src: pve-nag-remover
    dest: "{{ __nag_screen_script_path }}/pve-nag-remover"
    mode: '644'
    owner: root
    group: root
  notify: Run pve-nag-remover

- name: Copy 99-pve-no-nag-script
  ansible.builtin.copy:
    src: 99-pve-no-nag-script
    dest: /etc/apt/apt.conf.d/99-pve-no-nag-script
    mode: '644'
    owner: root
    group: root
